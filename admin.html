<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1f3a" />
    <title>Central da Comissão Técnica 5S</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/styles/admin.css" />
  </head>
  <body>
    <main class="admin-shell">
      <section id="admin-login-panel" class="login-panel">
        <div class="login-card">
          <img class="admin-logo" src="/assets/images/logo-missao-5s.png" alt="Missão 5S Funilaria Goiana" onerror="this.hidden=true" />
          <p class="eyebrow">Central da Comissão Técnica 5S</p>
          <h1>Copa 5S</h1>
          <p>Entre com um usuário criado no Supabase Auth.</p>
          <form id="admin-login-form" class="admin-form" autocomplete="off">
            <label>
              E-mail
              <input name="email" type="email" autocomplete="username" required />
            </label>
            <label>
              Senha
              <input name="password" type="password" autocomplete="current-password" required />
            </label>
            <p id="admin-login-error" class="form-error" role="alert"></p>
            <button class="primary-button" type="submit">Entrar</button>
          </form>
        </div>
      </section>

      <section id="admin-app-panel" class="admin-panel" hidden>
        <header class="admin-topbar">
          <img class="admin-logo-small" src="/assets/images/logo-missao-5s.png" alt="Missão 5S Funilaria Goiana" onerror="this.hidden=true" />
          <div>
            <p class="eyebrow">Súmula do campeonato</p>
            <h1>Central da Comissão Técnica 5S</h1>
          </div>
          <button id="admin-signout" class="ghost-button" type="button">Sair</button>
        </header>

        <div id="admin-notice" class="admin-notice" hidden></div>

        <section id="admin-summary" class="summary-grid" aria-label="Resumo do evento"></section>

        <section class="admin-actions">
          <div class="admin-filters">
            <label>
              Busca
              <input id="admin-search" type="search" placeholder="Nome ou matrícula" />
            </label>
            <label>
              Turno
              <select id="admin-turno"></select>
            </label>
            <label>
              Senso
              <select id="admin-senso"></select>
            </label>
            <label>
              Status
              <select id="admin-status"></select>
            </label>
          </div>
          <div class="admin-action-buttons">
            <button id="admin-export" class="secondary-button" type="button">Exportar CSV</button>
            <button id="admin-clear" class="danger-button" type="button">Limpar dados do evento</button>
          </div>
        </section>

        <section>
          <div class="section-title">
            <h2>Súmula do campeonato</h2>
            <span id="admin-count">0 registros</span>
          </div>
          <div id="admin-ideas-list" class="ideas-list"></div>
        </section>
      </section>
    </main>
    <script type="module" src="/src/admin/admin.js"></script>
  </body>
</html>
