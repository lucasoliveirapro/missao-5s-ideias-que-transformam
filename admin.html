<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1f3a" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Admin | Missão 5S</title>
    <link rel="icon" href="/assets/images/logo-placeholder.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles/admin.css" />
  </head>
  <body>
    <main class="admin-app">
      <section class="admin-header" aria-labelledby="admin-title">
        <div>
          <p class="eyebrow">Painel administrativo</p>
          <h1 id="admin-title">Missão 5S: Ideias que Transformam</h1>
        </div>
        <button id="logout-button" class="ghost-button" type="button" hidden>Sair</button>
      </section>

      <section id="config-warning" class="admin-warning" hidden>
        Firebase ainda não configurado. Configure o arquivo src/firebase.js antes de usar o painel administrativo.
      </section>

      <section id="login-section" class="login-panel" aria-labelledby="login-title">
        <div>
          <p class="eyebrow">Acesso restrito</p>
          <h2 id="login-title">Entrar com Firebase Authentication</h2>
        </div>
        <form id="login-form" class="login-form">
          <label>
            E-mail
            <input id="admin-email" name="email" type="email" autocomplete="email" required />
          </label>
          <label>
            Senha
            <input id="admin-password" name="password" type="password" autocomplete="current-password" required />
          </label>
          <button class="primary-button" type="submit">Entrar</button>
          <p id="login-error" class="form-error" role="alert"></p>
        </form>
      </section>

      <section id="admin-panel" class="admin-panel" hidden>
        <div class="session-row">
          <span id="admin-user"></span>
          <span id="data-status">Aguardando dados...</span>
        </div>

        <section id="summary-cards" class="summary-grid" aria-label="Resumo do evento"></section>

        <section class="filters-panel" aria-label="Filtros administrativos">
          <label>
            Busca
            <input id="admin-search" type="search" placeholder="Nome ou matrícula" />
          </label>
          <label>
            Turno
            <select id="admin-filter-turno">
              <option value="">Todos</option>
              <option value="1º Turno">1º Turno</option>
              <option value="2º Turno">2º Turno</option>
              <option value="3º Turno">3º Turno</option>
            </select>
          </label>
          <label>
            Senso
            <select id="admin-filter-senso">
              <option value="">Todos</option>
              <option value="SEIRI — Utilização">SEIRI — Utilização</option>
              <option value="SEITON — Organização">SEITON — Organização</option>
              <option value="SEISOU — Limpeza">SEISOU — Limpeza</option>
              <option value="SEIKETSU — Saúde">SEIKETSU — Saúde</option>
              <option value="SHITSUKE — Disciplina">SHITSUKE — Disciplina</option>
            </select>
          </label>
          <label>
            Status
            <select id="admin-filter-status">
              <option value="">Todos</option>
              <option value="Recebida">Recebida</option>
              <option value="Em análise">Em análise</option>
              <option value="Aprovada">Aprovada</option>
              <option value="Implantada">Implantada</option>
              <option value="Recusada">Recusada</option>
            </select>
          </label>
        </section>

        <section class="admin-actions" aria-label="Ações administrativas">
          <button id="export-csv" class="secondary-button" type="button">Exportar CSV</button>
          <button id="clear-event" class="danger-button" type="button">Limpar dados do evento</button>
        </section>

        <section>
          <div class="list-header">
            <h2>Ideias recebidas</h2>
            <span id="ideas-count">0 ideias</span>
          </div>
          <div id="ideas-list" class="ideas-grid"></div>
        </section>
      </section>
    </main>

    <div id="toast-root" class="toast-root" aria-live="polite"></div>
    <script type="module" src="/src/admin/admin.js"></script>
  </body>
</html>
