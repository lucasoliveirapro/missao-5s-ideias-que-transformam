name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  lint-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Secret scan basic
        shell: bash
        run: |
          if grep -R "SUPABASE_SERVICE_ROLE_KEY=" -n . --exclude-dir=node_modules --exclude-dir=.git --exclude=.env.example; then
            echo "Potential secret found"
            exit 1
          fi
          if find . \( -name "*.xlsx" -o -name "*.xls" -o -name "*.xlsm" -o -name "*.csv" \) -not -path "./node_modules/*" -not -path "./.git/*" | grep .; then
            echo "Data export file found in repository"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
